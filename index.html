<!DOCTYPE html>
<html lang="pt-PT" data-theme="light" class="tema-macos">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title id="app-title">Gestão de Horas Cloud</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    
    <style>
        /* Estilos de Variáveis Dinâmicas */
        :root {
            --primary: #007AFF;
            --primary-light: rgba(0, 122, 255, 0.1);
            --bg-color: #F2F2F7;
            --surface: #FFFFFF;
            --text-main: #000000;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --tab-bar-height: 65px;
            --header-height: 52px;
        }

        /* Tema Rural Chic */
        .tema-rustico {
            --primary: #8B4513;
            --primary-light: rgba(139, 69, 19, 0.1);
            --bg-color: #FDF5E6;
            --surface: #FAF0E6;
            --text-main: #4A3728;
            --font-family: "Georgia", serif;
        }

        /* Tema Minimalista */
        .tema-minimal {
            --primary: #222222;
            --primary-light: rgba(34, 34, 34, 0.05);
            --bg-color: #FAFAFA;
            --surface: #FFFFFF;
            --text-main: #222222;
            --font-family: "Helvetica", sans-serif;
        }

        /* ... (Mantém o restante do CSS original abaixo) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        
        /* Adiciona a configuração de cores dinâmicas via JS */
    </style>
</head>
<body>
    <!-- (Mantém a estrutura anterior e adiciona a secção Configurações) -->
    
    <!-- Nova Secção Configurações -->
    <section id="configuracoes" class="section-container">
        <div class="card">
            <h3><i class="fa-solid fa-gear"></i> Preferências</h3>
            <div class="form-group">
                <label>Nome da Aplicação</label>
                <input type="text" id="cfg_nome" oninput="salvarConfigs()">
            </div>
            <div class="form-group">
                <label>Estilo Visual</label>
                <select id="cfg_tema" onchange="salvarConfigs()">
                    <option value="tema-macos">macOS Style</option>
                    <option value="tema-rustico">Rural Chic</option>
                    <option value="tema-minimal">Minimal</option>
                </select>
            </div>
            <div class="form-group">
                <label>Cor Principal</label>
                <input type="color" id="cfg_cor" oninput="salvarConfigs()">
            </div>
        </div>
        <button class="btn btn-cancel" onclick="mudarSeparador('horas')">Voltar</button>
    </section>

    <script>
        // Carregar configurações
        function carregarConfigs() {
            const cfg = JSON.parse(localStorage.getItem('user_configs')) || {
                nomeApp: 'Gestão de Horas Cloud',
                tema: 'tema-macos',
                cor: '#007AFF'
            };
            document.getElementById('cfg_nome').value = cfg.nomeApp;
            document.getElementById('cfg_tema').value = cfg.tema;
            document.getElementById('cfg_cor').value = cfg.cor;
            aplicarConfigs(cfg);
        }

        function salvarConfigs() {
            const cfg = {
                nomeApp: document.getElementById('cfg_nome').value,
                tema: document.getElementById('cfg_tema').value,
                cor: document.getElementById('cfg_cor').value
            };
            localStorage.setItem('user_configs', JSON.stringify(cfg));
            aplicarConfigs(cfg);
        }

        function aplicarConfigs(cfg) {
            document.getElementById('app-title').innerText = cfg.nomeApp;
            document.getElementById('main-title').innerText = cfg.nomeApp;
            document.body.className = cfg.tema;
            document.documentElement.style.setProperty('--primary', cfg.cor);
            document.documentElement.style.setProperty('--primary-light', cfg.cor + '1A');
        }

        // Chamar no onload

        // Chamar no onload
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkLqbxqQdoM3Taf-gwVmpJENPRuyTXzVBgJPRXn26qaazhut0MFWfzH4d4Q4jZbCNmxA/exec";
        
        let registos = []; let despesasRegistadas = []; let agendaRegistada = []; 
        let idEmEdicao = null; let idEmEdicaoDespesa = null; let idEmEdicaoAgenda = null;
        let documentoPDFFinal = null; let nomePDFFinal = ""; 
        let chartClientesInst=null, chartMesesInst=null, chartDespesasInst=null;
        
        let paginaAtual = 1; const ITENS_POR_PAGINA = 15;
        let pinApp = localStorage.getItem('app_pin') || '';
        
        // Fila de Sincronização Offline
        let filaSync = JSON.parse(localStorage.getItem('fila_sync_dados')) || [];

        // ============================ FUNÇÕES DE DATA E CALENDÁRIO ============================
        
        function formatLocalYYYYMMDD(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function formatMesAno(date) {
            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            return `${meses[date.getMonth()]} ${date.getFullYear()}`;
        }

        function centrarCalendario(containerId) {
            setTimeout(() => {
                const container = document.getElementById(containerId);
                if (container && container.offsetParent !== null) { 
                    const activeItem = container.querySelector('.date-item.active');
                    if (activeItem) {
                        activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else {
                        container.scrollTo({ left: 0, behavior: 'smooth' });
                    }
                }
            }, 50); 
        }

        function renderizarCarrosselMes(containerId, inputId, forceViewDate = null) {
            const container = document.getElementById(containerId);
            const hiddenInput = document.getElementById(inputId);
            const labelId = containerId.replace('container-data-', 'month-label-');
            const monthLabel = document.getElementById(labelId);
            
            let activeDate = new Date(); 
            if (hiddenInput.value) {
                const parts = hiddenInput.value.split('-');
                if(parts.length === 3) activeDate = new Date(parts[0], parts[1]-1, parts[2]);
            }
            
            let viewDate = forceViewDate || container.viewDate || new Date(activeDate);
            container.viewDate = new Date(viewDate); 
            
            if (monthLabel) monthLabel.innerText = formatMesAno(viewDate);
            container.innerHTML = '';
            
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const d = new Date(year, month, i);
                const dateStr = formatLocalYYYYMMDD(d);
                
                const item = document.createElement('div');
                item.className = 'date-item';
                
                if (hiddenInput.value === dateStr) item.classList.add('active');
                
                item.innerHTML = `
                    <span class="day-name">${d.toLocaleDateString('pt-PT', {weekday: 'short'}).substring(0,3)}</span>
                    <span class="day-number">${d.getDate()}</span>
                `;
                
                item.onclick = () => {
                    hiddenInput.value = dateStr;
                    renderizarCarrosselMes(containerId, inputId); 
                };
                container.appendChild(item);
            }
            centrarCalendario(containerId);
        }

        function mudarMesCalendario(delta, containerId, inputId) {
            const container = document.getElementById(containerId);
            let viewDate = container.viewDate ? new Date(container.viewDate) : new Date();
            
            viewDate.setDate(1); 
            viewDate.setMonth(viewDate.getMonth() + delta);
            
            const hoje = new Date();
            if (viewDate.getMonth() === hoje.getMonth() && viewDate.getFullYear() === hoje.getFullYear()) {
                document.getElementById(inputId).value = formatLocalYYYYMMDD(hoje);
                renderizarCarrosselMes(containerId, inputId, hoje);
            } else {
                document.getElementById(inputId).value = formatLocalYYYYMMDD(viewDate);
                renderizarCarrosselMes(containerId, inputId, viewDate);
            }
        }

        function irParaHoje(containerId, inputId) {
            const hoje = new Date();
            document.getElementById(inputId).value = formatLocalYYYYMMDD(hoje);
            renderizarCarrosselMes(containerId, inputId, hoje);
        }

        // ============================ GESTOS SWIPE (DESLIZAR) ============================
        let touchstartX = 0;
        let touchendX = 0;
        const tabsOrder = ['horas', 'despesas', 'agenda', 'estatisticas'];
        
        function handleSwipe() {
            const deltaX = touchendX - touchstartX;
            if (Math.abs(deltaX) > 70) { 
                const currentTab = document.querySelector('.section-container.active').id;
                let idx = tabsOrder.indexOf(currentTab);
                
                if (deltaX < 0 && idx < tabsOrder.length - 1) {
                    mudarSeparador(tabsOrder[idx + 1]); 
                } else if (deltaX > 0 && idx > 0) {
                    mudarSeparador(tabsOrder[idx - 1]); 
                }
            }
        }
        
        document.getElementById('main-scroll-area').addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});
        
        document.getElementById('main-scroll-area').addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});


        // ============================ UI & NAVEGAÇÃO ============================
        window.onload = () => {
            if(!localStorage.getItem('tema_final')) {
               if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                   document.documentElement.setAttribute('data-theme', 'dark');
               }
            } else if (localStorage.getItem('tema_final') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            
            const dHojeStr = formatLocalYYYYMMDD(new Date());
            document.getElementById('data').value = dHojeStr;
            document.getElementById('d_data').value = dHojeStr;
            document.getElementById('a_data').value = dHojeStr;
            
            renderizarCarrosselMes('container-data-horas', 'data');
            renderizarCarrosselMes('container-data-despesas', 'd_data');
            renderizarCarrosselMes('container-data-agenda', 'a_data');
            
            const t = localStorage.getItem('taxa_hora_guardada'); if(t) document.getElementById('taxa_hora').value = t;
            ['tx_irs','tx_ss'].forEach((k,i)=>{ let v=localStorage.getItem(k); if(v) document.getElementById(['inp_irs','inp_ss'][i]).value=v; });
            
            if (pinApp) iniciarAppApósLogin();
        };

        function alternarTema() { 
            const root = document.documentElement;
            const isDark = root.getAttribute('data-theme') === 'dark';
            root.setAttribute('data-theme', isDark ? 'light' : 'dark'); 
            localStorage.setItem('tema_final', isDark ? 'light' : 'dark'); 
            if(chartClientesInst) gerarGraficosGerais(); 
        }

        function setCarregando(ativo) {
            const loader = document.getElementById('global-loader');
            if (ativo) loader.classList.add('active'); else loader.classList.remove('active');
        }

        function showToast(msg, tipo="success") {
            const t = document.createElement('div'); t.className = 'toast'; 
            let icon = 'fa-check-circle', cor = 'var(--secondary)';
            if(tipo === 'error') { icon = 'fa-circle-exclamation'; cor = 'var(--danger)'; }
            if(tipo === 'warning') { icon = 'fa-triangle-exclamation'; cor = 'var(--warning)'; }
            if(tipo === 'info') { icon = 'fa-info-circle'; cor = 'var(--primary)'; }
            
            t.innerHTML = `<i class="fa-solid ${icon}" style="color:${cor}; font-size:1.2rem;"></i> <span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.style.animation = 'toastIn 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) reverse forwards'; setTimeout(()=>t.remove(),300); }, 3000);
        }

        function mudarSeparador(id, btnElement = null) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else {
                const btn = document.getElementById('menu-'+id);
                if(btn) btn.classList.add('active');
            }
            
            const titles = { 'horas': 'Gestão de Horas', 'despesas': 'Despesas', 'agenda': 'Agenda', 'estatisticas': 'Estatísticas' };
            document.getElementById('main-title').innerText = titles[id];

            document.querySelectorAll('.section-container').forEach(sec => sec.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.getElementById('main-scroll-area').scrollTop = 0;
            centrarCalendario('container-data-' + id);

            if(id === 'estatisticas') gerarGraficosGerais();
        }

        function toggleGavetaMais() {
            const f = document.getElementById('gaveta-fundo'); const g = document.getElementById('gaveta-opcoes');
            if(g.classList.contains('show')){ g.classList.remove('show'); f.classList.remove('show'); } 
            else{ g.classList.add('show'); f.classList.add('show'); }
        }
        function fecharModal(id) { document.getElementById(id).classList.remove('show'); }

        // ============================ LOGIN ============================
        let pinTemp = "";
        function teclarPIN(num) {
            if (pinTemp.length < 4) { pinTemp += num; atualizarBolinhas(); }
            if (pinTemp.length === 4) document.getElementById('btn-login').disabled = false;
        }
        function limparPIN() { pinTemp = ""; atualizarBolinhas(); document.getElementById('btn-login').disabled = true; }
        function apagarUltimoPIN() { pinTemp = pinTemp.slice(0, -1); atualizarBolinhas(); document.getElementById('btn-login').disabled = true; }
        function atualizarBolinhas(erro = false) {
            document.querySelectorAll('.pin-dot').forEach((dot, idx) => {
                dot.className = 'pin-dot';
                if(erro) dot.style.borderColor = 'var(--danger)';
                else if (idx < pinTemp.length) dot.classList.add('filled');
            });
        }
        async function verificarPinLogin() {
            pinApp = pinTemp; localStorage.setItem('app_pin', pinApp);
            await iniciarAppApósLogin();
        }
        async function iniciarAppApósLogin() {
            setCarregando(true);
            const sucesso = await carregarDadosDoGoogle();
            setCarregando(false);
            if (sucesso) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('login-screen').style.display = 'none'; 
                    document.getElementById('app-content').style.display = 'flex'; 
                    redefinirPaginaE_Renderizar(); 
                    centrarCalendario('container-data-horas');
                }, 500);
            } else {
                atualizarBolinhas(true); setTimeout(() => limparPIN(), 600);
                pinApp = ''; localStorage.removeItem('app_pin'); showToast("PIN Incorreto", "error");
            }
        }
        function sairApp() { pinApp = ''; localStorage.removeItem('app_pin'); location.reload(); }

        // ============================ BUSCA DADOS API ============================
        async function carregarDadosDoGoogle() {
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?nocache=${Date.now()}&pin=${pinApp}`);
                const json = await res.json();
                if (json.erro && json.erro === "PIN incorreto") return false;
                
                const fix = (r) => { if (r.data && String(r.data).includes('T')) r.data = String(r.data).split('T')[0]; }; 
                if(json.registos) { json.registos.forEach(fix); registos = json.registos; } 
                if(json.despesas) { json.despesas.forEach(fix); despesasRegistadas = json.despesas; } 
                if(json.agenda) { json.agenda.forEach(fix); agendaRegistada = json.agenda; } 
                atualizarDropdownsFiltros(); return true;
            } catch (e) { showToast("Modo Offline: Usando dados em cache", "warning"); return false; }
        }
        async function atualizarDados(mostrar=false) { if(mostrar) setCarregando(true); await carregarDadosDoGoogle(); if(mostrar) { setCarregando(false); redefinirPaginaE_Renderizar(); showToast("Dados Atualizados");} }

        // ============================ FUNÇÕES AUXILIARES ============================
        function formatDataBR(d) { if(!d) return '--'; return String(d).split('T')[0].split('-').reverse().join('/'); }
        function formatDataForm(d) { if(!d) return ''; return String(d).split('T')[0]; }
        function formatHora(h) { 
            if(!h) return '--:--'; const s = String(h);
            if(s.includes('T')) { const dt = new Date(s); if(!isNaN(dt.getTime())) return dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0'); } 
            return s.substring(0,5); 
        }
        function calcDiferenca(i, f) { const [hI,mI]=i.split(':').map(Number), [hF,mF]=f.split(':').map(Number); let tot=(hF*60+mF)-(hI*60+mI); if(tot<0) tot+=24*60; const h=Math.floor(tot/60); return { texto:`${h}h ${(tot%60).toString().padStart(2,'0')}m`, mins:tot, dec:h+((tot%60)/60) }; }

        function confirmarAcao(titulo, msg, isDanger, texto, callback) {
            document.getElementById('modal-title').innerText = titulo; 
            document.getElementById('modal-text').innerText = msg;
            
            const btn = document.getElementById('btn-confirm-action'); 
            btn.innerText = texto; 
            btn.className = isDanger ? 'danger-text' : 'primary-text';
            
            btn.onclick = () => { fecharModal('modal-confirm'); callback(); };
            document.getElementById('modal-confirm').classList.add('show');
        }

        // ============================ SINCRONIZAÇÃO OFFLINE ============================
        async function sincronizarAPI(payload, sucessoMsg) {
            if (!navigator.onLine) {
                filaSync.push({ payload, sucessoMsg });
                localStorage.setItem('fila_sync_dados', JSON.stringify(filaSync));
                if(sucessoMsg) showToast("Offline: Guardado localmente", "warning");
                return;
            }
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.sucesso) {
                    if(sucessoMsg) showToast(sucessoMsg); 
                } else {
                    if(sucessoMsg) showToast("Erro na nuvem", "error");
                }
            } catch(e) { 
                filaSync.push({ payload, sucessoMsg });
                localStorage.setItem('fila_sync_dados', JSON.stringify(filaSync));
                if(sucessoMsg) showToast("Sem rede. Guardado para depois.", "warning"); 
            }
        }

        window.addEventListener('online', async () => {
            if (filaSync.length > 0) {
                showToast("A sincronizar dados pendentes...", "info");
                const pendentes = [...filaSync];
                filaSync = []; 
                localStorage.setItem('fila_sync_dados', JSON.stringify(filaSync));
                
                for (let item of pendentes) {
                    await sincronizarAPI(item.payload, item.sucessoMsg ? "Sincronizado!" : null);
                }
            }
        });

        // ============================ REGISTOS (HORAS) ============================
        function verificarSobreposicaoHoras(d, i, f, editId) {
            for (let r of registos) {
                if (r.data === d && r.id !== editId) {
                    if (i < formatHora(r.fim) && f > formatHora(r.inicio)) {
                        return true; 
                    }
                }
            }
            return false;
        }

        function atualizarDropdownsFiltros() {
            const cls = [...new Set(registos.map(r => r.cliente).filter(c => c))].sort();
            document.getElementById('lista_clientes').innerHTML = cls.map(c => `<option value="${c}">`).join('');
            const sC = document.getElementById('filtro_cliente'); const valC = sC.value; sC.innerHTML = '<option value="todos">Cliente: Todos</option>' + cls.map(c => `<option value="${c}">${c}</option>`).join(''); if(cls.includes(valC)) sC.value = valC;
            const mss = [...new Set(registos.map(r => r.data ? String(r.data).substring(0,7) : ''))].filter(m=>m).sort().reverse();
            const sM = document.getElementById('filtro_mes'); const valM = sM.value; sM.innerHTML = '<option value="todos">Mês: Todos</option>' + mss.map(m => { const [a, ms] = m.split('-'); return `<option value="${m}">${new Date(a, ms-1).toLocaleString('pt-PT', {month:'long'})} ${a}</option>`; }).join(''); if(mss.includes(valM)) sM.value = valM;
        }

        function redefinirPaginaE_Renderizar() { paginaAtual = 1; renderizarTabelaRegistos(); renderizarDespesas(); renderizarAgenda(); }
        function mudarPagina(d) { paginaAtual += d; renderizarTabelaRegistos(); document.getElementById('main-scroll-area').scrollTop = 0; }
        function obterRegistosFiltrados() { const fM = document.getElementById('filtro_mes').value, fC = document.getElementById('filtro_cliente').value; return registos.sort((a,b)=>new Date(b.data)-new Date(a.data)).filter(r => (fM==='todos'||(r.data&&String(r.data).substring(0,7)===fM)) && (fC==='todos'||r.cliente===fC)); }

        function renderizarTabelaRegistos() {
            const tb = document.getElementById('tabela_registos'); tb.innerHTML = ''; const todos = obterRegistosFiltrados();
            let sMin=0, sVal=0; const dias = new Set(); 
            todos.forEach(r => { if(r.data) dias.add(r.data); sMin += parseInt(r.minutosTotais||0); sVal += parseFloat(r.valorGasto||0); });
            document.getElementById('total_dias').innerText = dias.size; document.getElementById('total_horas').innerText = `${Math.floor(sMin/60)}h ${(sMin%60).toString().padStart(2,'0')}m`; document.getElementById('total_ganho').innerText = `${sVal.toFixed(2)} €`;
            
            const totalP = Math.ceil(todos.length / ITENS_POR_PAGINA) || 1; 
            if(paginaAtual<1) paginaAtual=1; if(paginaAtual>totalP) paginaAtual=totalP;
            document.getElementById('paginacao_info').innerText = `Pág ${paginaAtual}/${totalP}`; 
            document.getElementById('btn_pag_ant').disabled = (paginaAtual===1); document.getElementById('btn_pag_prox').disabled = (paginaAtual===totalP);

            const slice = todos.slice((paginaAtual-1)*ITENS_POR_PAGINA, paginaAtual*ITENS_POR_PAGINA);
            if(slice.length===0) tb.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--text-muted); padding: 30px;">Sem registos encontrados.</td></tr>';
            slice.forEach(r => { 
                tb.innerHTML += `<tr><td data-label="Data">${formatDataBR(r.data)}</td><td data-label="Cliente"><strong>${r.cliente||'--'}</strong></td><td data-label="Início">${formatHora(r.inicio)}</td><td data-label="Fim">${formatHora(r.fim)}</td><td data-label="Duração"><span style="background:var(--primary-light); color:var(--primary); padding:3px 8px; border-radius:12px; font-weight: 500; font-size:0.8rem;">${r.duracaoTexto}</span></td><td data-label="Val/h">${parseFloat(r.taxaUsada).toFixed(2)}€</td><td data-label="Total" style="font-weight:600;">${parseFloat(r.valorGasto).toFixed(2)}€</td><td class="action-btns"><button class="edit-btn" onclick="editarRegisto('${r.id}')"><i class="fa-solid fa-pen"></i></button><button class="delete-btn" onclick="apagarRegistoAPI('${r.id}', 'este registo')"><i class="fa-solid fa-trash"></i></button></td></tr>`; 
            });
            calcularFinancas();
        }

        async function adicionarRegisto() {
            const d=document.getElementById('data').value, cli=document.getElementById('cliente').value, i=document.getElementById('hora_inicio').value, f=document.getElementById('hora_fim').value, t=parseFloat(document.getElementById('taxa_hora').value); 
            if(!d || !i || !f || isNaN(t)) { showToast("Preencha todos os campos", "error"); return; } 
            
            if(verificarSobreposicaoHoras(d, i, f, idEmEdicao)) {
                showToast("Aviso: Sobreposição de horários detetada!", "warning");
            }

            const c = calcDiferenca(i,f); const id = idEmEdicao || 'R_'+Date.now();
            const novo = { id: id, data: d, cliente: cli, inicio: i, fim: f, duracaoTexto: c.texto, minutosTotais: c.mins, taxaUsada: t, valorGasto: c.dec*t };
            
            if(idEmEdicao) { const idx = registos.findIndex(x=>x.id===idEmEdicao); if(idx!==-1) registos[idx]=novo; } else registos.unshift(novo);
            cancelarEdicaoRegisto(); atualizarDropdownsFiltros(); renderizarTabelaRegistos();
            localStorage.setItem('taxa_hora_guardada', t);
            sincronizarAPI({ pin: pinApp, tipo: 'registo', ...novo }, "Registo Guardado!");
        }
        function editarRegisto(id) { 
            const r = registos.find(x => x.id === id); if (!r) return; idEmEdicao = id;
            document.getElementById('titulo_form_registo').innerHTML = 'A Editar Serviço';
            
            const dataF = formatDataForm(r.data);
            document.getElementById('data').value = dataF; 
            const parts = dataF.split('-');
            const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
            renderizarCarrosselMes('container-data-horas', 'data', dateObj);
            
            document.getElementById('cliente').value=r.cliente||''; document.getElementById('hora_inicio').value=formatHora(r.inicio); document.getElementById('hora_fim').value=formatHora(r.fim); document.getElementById('taxa_hora').value=r.taxaUsada; 
            document.getElementById('btn_cancelar_registo').style.display='block'; 
            
            // Força a área principal a subir e, caso o browser intercepte, sobe também a window
            document.getElementById('main-scroll-area').scrollTop = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function cancelarEdicaoRegisto() { 
            idEmEdicao=null; 
            document.getElementById('titulo_form_registo').innerHTML='<i class="fa-solid fa-stopwatch" style="color: var(--primary); margin-right: 6px;"></i>Novo Serviço'; 
            document.getElementById('btn_cancelar_registo').style.display='none'; 
            ['cliente','hora_inicio','hora_fim'].forEach(x=>document.getElementById(x).value=''); 
            irParaHoje('container-data-horas', 'data'); 
        }

        function calcularFinancas() {
            const fM = document.getElementById('filtro_mes').value; let df = despesasRegistadas; if(fM!=='todos') df = df.filter(d=>d.data&&String(d.data).substring(0,7)===fM);
            const rReal = df.reduce((s,d)=>s+parseFloat(d.valor||0),0); document.getElementById('f_despesas_totais').innerText = rReal.toFixed(2)+' €';
            const b = parseFloat(document.getElementById('total_ganho').innerText)||0; const txIRS = (parseFloat(document.getElementById('inp_irs').value)||0)/100; const txSS = (parseFloat(document.getElementById('inp_ss').value)||0)/100;
            const tImp = b * (txIRS+txSS); document.getElementById('f_impostos').innerText = tImp.toFixed(2)+' €'; document.getElementById('f_liquido').innerText = (b-rReal-tImp).toFixed(2)+' €';
            localStorage.setItem('tx_irs', document.getElementById('inp_irs').value); localStorage.setItem('tx_ss', document.getElementById('inp_ss').value);
        }

        // ============================ DESPESAS ============================
        function renderizarDespesas() {
            const tb = document.getElementById('tabela_despesas'); tb.innerHTML='';
            let ods = [...despesasRegistadas].sort((a,b)=>new Date(b.data)-new Date(a.data));
            if(ods.length===0) tb.innerHTML='<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding: 30px;">Sem despesas registadas.</td></tr>';
            ods.forEach(d => tb.innerHTML+=`<tr><td data-label="Data">${formatDataBR(d.data)}</td><td data-label="Cat">${d.categoria}</td><td data-label="Desc">${d.descricao}</td><td data-label="Valor" style="color:var(--danger); font-weight:600;">${parseFloat(d.valor).toFixed(2)}€</td><td class="action-btns"><button class="edit-btn" onclick="editarDespesa('${d.id}')"><i class="fa-solid fa-pen"></i></button><button class="delete-btn" onclick="apagarRegistoAPI('${d.id}', 'esta despesa')"><i class="fa-solid fa-trash"></i></button></td></tr>`);
        }
        async function guardarDespesa() {
            const d=document.getElementById('d_data').value, cat=document.getElementById('d_categoria').value, desc=document.getElementById('d_descricao').value, val=parseFloat(document.getElementById('d_valor').value); 
            if(!d || isNaN(val)) { showToast("Preencha data e valor!", "error"); return; } 
            const id = idEmEdicaoDespesa || 'D_'+Date.now(); const nova = { id: id, data: d, categoria: cat, descricao: desc, valor: val };
            if(idEmEdicaoDespesa) { const idx = despesasRegistadas.findIndex(x=>x.id===idEmEdicaoDespesa); if(idx!==-1) despesasRegistadas[idx]=nova; } else despesasRegistadas.unshift(nova);
            cancelarEdicaoDespesa(); renderizarDespesas(); calcularFinancas();
            sincronizarAPI({ pin: pinApp, tipo: 'despesa', ...nova }, "Despesa Guardada!");
        }
        function editarDespesa(id) {
            const d = despesasRegistadas.find(x=>x.id===id); if(!d) return; idEmEdicaoDespesa = id;
            document.getElementById('titulo_form_despesa').innerHTML = 'A Editar Despesa';
            
            const dataF = formatDataForm(d.data);
            document.getElementById('d_data').value = dataF; 
            const parts = dataF.split('-');
            const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
            renderizarCarrosselMes('container-data-despesas', 'd_data', dateObj); 
            
            document.getElementById('d_categoria').value=d.categoria; document.getElementById('d_descricao').value=d.descricao; document.getElementById('d_valor').value=d.valor;
            document.getElementById('btn_cancelar_despesa').style.display='block'; 
            
            document.getElementById('main-scroll-area').scrollTop = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function cancelarEdicaoDespesa() { 
            idEmEdicaoDespesa=null; 
            document.getElementById('titulo_form_despesa').innerHTML='<i class="fa-solid fa-receipt" style="color: var(--danger); margin-right: 6px;"></i>Nova Despesa'; 
            document.getElementById('btn_cancelar_despesa').style.display='none'; document.getElementById('d_valor').value=''; document.getElementById('d_descricao').value=''; 
            irParaHoje('container-data-despesas', 'd_data');
        }

        // ============================ AGENDA ============================
        function renderizarAgenda() {
            const tb = document.getElementById('tabela_agenda'); tb.innerHTML='';
            let ods = [...agendaRegistada].sort((a,b)=>new Date(a.data)-new Date(b.data));
            if(ods.length===0) tb.innerHTML='<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding: 30px;">Agenda limpa.</td></tr>';
            ods.forEach(a => tb.innerHTML+=`<tr><td data-label="Data">${formatDataBR(a.data)}</td><td data-label="Hora">${formatHora(a.hora)}</td><td data-label="Evento"><strong>${a.titulo}</strong></td><td class="action-btns"><button class="edit-btn" onclick="editarAgenda('${a.id}')"><i class="fa-solid fa-pen"></i></button><button class="delete-btn" onclick="apagarRegistoAPI('${a.id}', 'este evento')"><i class="fa-solid fa-trash"></i></button></td></tr>`);
        }
        
        async function guardarAgenda() {
            const d=document.getElementById('a_data').value, h=document.getElementById('a_hora').value, t=document.getElementById('a_titulo').value; 
            const rec=document.getElementById('a_recorrencia').value;
            if(!d || !t) { showToast("Preencha data e título!", "error"); return; }
            
            const id = idEmEdicaoAgenda || 'A_'+Date.now(); 
            const novo = { id: id, data: d, hora: h, titulo: t };
            
            if(idEmEdicaoAgenda) { 
                const idx = agendaRegistada.findIndex(x=>x.id===idEmEdicaoAgenda); 
                if(idx!==-1) agendaRegistada[idx]=novo; 
            } else {
                agendaRegistada.push(novo);
            }
            sincronizarAPI({ pin: pinApp, tipo: 'agenda', ...novo }, "Evento Agendado!");
            
            if (!idEmEdicaoAgenda && rec !== 'nenhuma') {
                const baseDate = new Date(d);
                const isSemanal = rec === 'semanal';
                const loops = isSemanal ? 9 : 11; 
                
                for (let j = 1; j <= loops; j++) {
                    let nextDate = new Date(baseDate);
                    if (isSemanal) nextDate.setDate(nextDate.getDate() + (j * 7));
                    if (!isSemanal) nextDate.setMonth(nextDate.getMonth() + j);
                    
                    const strDate = formatLocalYYYYMMDD(nextDate);
                    const nId = 'A_' + Date.now() + j;
                    const nEv = { id: nId, data: strDate, hora: h, titulo: t };
                    
                    agendaRegistada.push(nEv);
                    sincronizarAPI({ pin: pinApp, tipo: 'agenda', ...nEv }, null);
                }
                showToast(`Repetições ${isSemanal ? 'semanais' : 'mensais'} criadas!`, "info");
            }
            
            cancelarEdicaoAgenda(); renderizarAgenda();
        }
        function editarAgenda(id) {
            const a = agendaRegistada.find(x=>x.id===id); if(!a) return; idEmEdicaoAgenda = id;
            document.getElementById('titulo_form_agenda').innerHTML = 'A Editar Evento';
            
            const dataF = formatDataForm(a.data);
            document.getElementById('a_data').value = dataF; 
            const parts = dataF.split('-');
            const dateObj = new Date(parts[0], parts[1]-1, parts[2]);
            renderizarCarrosselMes('container-data-agenda', 'a_data', dateObj);
            
            document.getElementById('a_hora').value=(formatHora(a.hora)!=='--:--')?formatHora(a.hora):''; document.getElementById('a_titulo').value=a.titulo;
            document.getElementById('btn_cancelar_agenda').style.display='block'; 
            
            document.getElementById('a_recorrencia_group').style.display='none';
            
            document.getElementById('main-scroll-area').scrollTop = 0;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function cancelarEdicaoAgenda() { 
            idEmEdicaoAgenda=null; 
            document.getElementById('titulo_form_agenda').innerHTML='<i class="fa-regular fa-calendar-alt" style="color: var(--warning); margin-right: 6px;"></i>Novo Evento'; 
            document.getElementById('btn_cancelar_agenda').style.display='none'; 
            document.getElementById('a_hora').value=''; document.getElementById('a_titulo').value=''; 
            
            document.getElementById('a_recorrencia_group').style.display='block';
            document.getElementById('a_recorrencia').value='nenhuma';
            
            irParaHoje('container-data-agenda', 'a_data');
        }

        // ============================ APAGAR GERAL ============================
        function apagarRegistoAPI(id, nome) {
            confirmarAcao("Eliminar Registo", `Pretende eliminar permanentemente ${nome}?`, true, "Apagar", () => {
                registos = registos.filter(r=>r.id!==id); despesasRegistadas = despesasRegistadas.filter(d=>d.id!==id); agendaRegistada = agendaRegistada.filter(a=>a.id!==id);
                redefinirPaginaE_Renderizar();
                
                if(!navigator.onLine) {
                    showToast("Apagado localmente (Offline)", "warning");
                    fetch(`${GOOGLE_SCRIPT_URL}?apagar=${id}&pin=${pinApp}&nocache=${Date.now()}`).catch(()=>{});
                } else {
                    fetch(`${GOOGLE_SCRIPT_URL}?apagar=${id}&pin=${pinApp}&nocache=${Date.now()}`).then(r=>r.json()).then(d=>showToast("Eliminado")).catch(()=>showToast("Eliminação pendente", "error"));
                }
            });
        }

        // ============================ ESTATÍSTICAS ============================
        function gerarGraficosGerais() { 
            if(chartClientesInst) chartClientesInst.destroy(); if(chartMesesInst) chartMesesInst.destroy(); if(chartDespesasInst) chartDespesasInst.destroy(); 
            
            const rootStyle = getComputedStyle(document.documentElement);
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const corTexto = isDark ? '#FFFFFF' : '#000000';
            const corBlue = rootStyle.getPropertyValue('--primary').trim();
            const corGrid = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            
            Chart.defaults.color = corTexto; 
            Chart.defaults.font.family = rootStyle.getPropertyValue('--font-family');
            
            let ptCl="", horas={}, deps={}; 
            registos.forEach(x => { ptCl = x.cliente||"S/ Nome"; horas[ptCl] = (horas[ptCl]||0)+parseFloat(x.valorGasto||0); let m = x.data?String(x.data).substring(0,7):null; if(m) deps[m] = (deps[m]||0)+(parseInt(x.minutosTotais||0)/60); }); 
            let grcat={}; despesasRegistadas.forEach(x => grcat[x.categoria||"Outras"] = (grcat[x.categoria||"Outras"]||0)+parseFloat(x.valor||0)); 
            
            const palette = [corBlue, '#34C759', '#FF9500', '#FF3B30', '#AF52DE', '#FF2D55'];
            
            chartClientesInst = new Chart(document.getElementById('graficoClientes'), { type:'pie', data:{ labels:Object.keys(horas).length ? Object.keys(horas) : ['Sem Dados'], datasets:[{data:Object.values(horas).length ? Object.values(horas) : [1], backgroundColor:palette, borderWidth: 0}] }, options:{plugins:{legend:{position:'bottom', labels: {padding: 15}}}} }); 
            chartMesesInst = new Chart(document.getElementById('graficoMeses'), { type:'bar', data:{ labels:Object.keys(deps).length ? Object.keys(deps) : ['Sem Dados'], datasets:[{label:'Horas Gastas', data:Object.values(deps), backgroundColor:corBlue, borderRadius: 6}] }, options:{scales:{y:{grid:{color:corGrid}}, x:{grid:{display:false}}}} }); 
            chartDespesasInst = new Chart(document.getElementById('graficoDespesas'), { type:'doughnut', data:{ labels:Object.keys(grcat).length ? Object.keys(grcat) : ['Sem Dados'], datasets:[{data:Object.values(grcat).length ? Object.values(grcat) : [1], backgroundColor:palette, borderWidth: 0}] }, options:{maintainAspectRatio:false, cutout: '70%', plugins:{legend:{position:'bottom', labels: {padding: 15}}}} }); 
        }

        // ============================ EXPORTAÇÃO ============================
        function iniciarBackupCSV() { 
            const f = obterRegistosFiltrados(); if(f.length===0){showToast("Nada para exportar", "error");return;} 
            confirmarAcao("Exportar CSV", "Pretende transferir o ficheiro Excel?", false, "Exportar", () => {
                let c = "\uFEFFData;Cliente;Inicio;Fim;Duracao;Valor Hora;Valor\n"; 
                f.forEach(r => c += `${formatDataForm(r.data)};${r.cliente||''};${formatHora(r.inicio)};${formatHora(r.fim)};${r.duracaoTexto};${parseFloat(r.taxaUsada).toFixed(2)};${parseFloat(r.valorGasto).toFixed(2)}\n`); 
                const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([c], {type:'text/csv;charset=utf-8;'})); a.download="Registos_Horas.csv"; a.click(); showToast("CSV Guardado."); 
            });
        }

        function preVisualizarPDF() { 
            const d = obterRegistosFiltrados(); if(d.length===0){showToast("A tabela está vazia.", "error");return;} 
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            
            doc.setFillColor(0, 122, 255); doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255, 255, 255); doc.setFont("helvetica", "bold"); doc.setFontSize(18); doc.text("RELATÓRIO DE ATIVIDADE", 14, 22);
            doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.text(`Emitido em: ${new Date().toLocaleDateString('pt-PT')}`, 14, 48);
            
            doc.autoTable({
                startY: 55,
                head: [['Data', 'Cliente', 'Início', 'Fim', 'Duração', 'Valor/h', 'Total']],
                body: d.map(r => [formatDataBR(r.data), r.cliente || '-', formatHora(r.inicio), formatHora(r.fim), r.duracaoTexto, parseFloat(r.taxaUsada).toFixed(2)+'€', parseFloat(r.valorGasto).toFixed(2)+'€']),
                theme: 'plain', 
                headStyles: { fillColor: [242, 242, 247], textColor: [0, 0, 0], fontStyle: 'bold' },
                styles: { font: 'helvetica', fontSize: 9, cellPadding: 4, borderBottomWidth: 0.1, borderBottomColor: [198, 198, 200] }
            });
            
            doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(0, 0, 0);
            doc.text(`Total Faturado: ${document.getElementById('total_ganho').innerText}`, 14, (doc.lastAutoTable.finalY || 55) + 15);
            documentoPDFFinal = doc; nomePDFFinal = "Relatorio_Atividades.pdf"; 
            document.getElementById('pdf-preview-frame').src = URL.createObjectURL(doc.output('blob')); 
            document.getElementById('modal-pdf').classList.add('show');
        }
        function gravarPDFFinal() { if(documentoPDFFinal) { documentoPDFFinal.save(nomePDFFinal); fecharModal('modal-pdf'); showToast("PDF Transferido!"); } }
    </script>
