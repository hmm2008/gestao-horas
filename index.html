<!DOCTYPE html>
<html lang="pt-PT" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Horas Cloud</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg-color: #f7f7f9; --card-bg: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b; --border-color: #e5e5ea; --accent-color: #007aff; }
        [data-theme="dark"] { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-muted: #98989d; --border-color: #38383a; --accent-color: #0a84ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .app-container { background: var(--card-bg); max-width: 800px; margin: auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-main); }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: var(--text-muted); font-weight: bold; }
        input { padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: transparent; color: inherit; color-scheme: light dark; }
        .btn-add { background: var(--accent-color); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        
        .summary-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(128,128,128,0.1); padding: 20px; border-radius: 12px; margin: 25px 0; border: 1px solid var(--border-color); }
        .summary-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-right: 1px solid var(--border-color); }
        .summary-item:last-child { border-right: none; }
        .val { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .lab { font-size: 12px; color: var(--text-muted); }
        
        .btn-pdf { background: #34c759; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .delete-btn { background: none; border: none; color: #ff3b30; cursor: pointer; font-size: 16px; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast { background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; margin-bottom: 10px; opacity: 0; transition: 0.3s; font-size: 14px; }
        .toast.show { opacity: 1; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .summary-panel { grid-template-columns: 1fr; }
            .summary-item { border-right: none; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
            .summary-item:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div class="app-container">
        <div class="header">
            <h1 style="margin:0;">Gestão de Horas</h1>
            <button class="theme-btn" onclick="alternarTema()">☀️/🌙</button>
        </div>
        <div class="form-grid">
            <div class="input-group"><label>Data</label><input type="date" id="data"></div>
            <div class="input-group"><label>Início</label><input type="time" id="hora_inicio"></div>
            <div class="input-group"><label>Fim</label><input type="time" id="hora_fim"></div>
            <div class="input-group"><label>Preço/h</label><input type="number" id="taxa_hora" step="0.5"></div>
        </div>
        <button class="btn-add" onclick="adicionarRegisto()">ADICIONAR REGISTO</button>

        <div class="summary-panel">
            <div class="summary-item"><span class="val" id="total_dias">0</span><span class="lab">Dias Trabalhados</span></div>
            <div class="summary-item"><span class="val" id="total_horas">0h</span><span class="lab">Total Horas</span></div>
            <div class="summary-item">
                <span class="val" id="total_ganho">0.00 €</span><span class="lab">A Receber</span>
                <button class="btn-pdf" onclick="exportarPDF()">ExportAR PDF</button>
            </div>
        </div>

        <table>
            <thead><tr><th>Data</th><th>Início</th><th>Fim</th><th>Duração</th><th>Taxa</th><th>Valor</th><th></th></tr></thead>
            <tbody id="tabela_registos"></tbody>
        </table>
    </div>

    <script>
        // === COLOQUE O SEU LINK ABAIXO ===
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1tokzLeRFCwh9MfA25xOusqi_qfFFtui4fRj-Tkvg8eJlcYW5948ZGbK9XNp8bV4Ldg/exec";
        
        let registos = [];

        // Registo do novo Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.update(); // Força a atualização do motor
            });
        }

        function alternarTema() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('tema_final', t);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000);
        }

        function formatData(d) { return d ? d.split('-').reverse().join('/') : ''; }

        function calcDiferenca(ini, fim) {
            const [hI, mI] = ini.split(':').map(Number);
            const [hF, mF] = fim.split(':').map(Number);
            let totMin = (hF * 60 + mF) - (hI * 60 + mI);
            if (totMin < 0) totMin += 24 * 60;
            const h = Math.floor(totMin / 60);
            return { texto: `${h}h ${(totMin % 60).toString().padStart(2,'0')}m`, mins: totMin, dec: h + ((totMin % 60)/60) };
        }

        async function carregarDadosDoGoogle() {
            if(GOOGLE_SCRIPT_URL.includes("COLE_AQUI")) { showToast("Coloque o seu link Apps Script!"); return; }
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                if(!res.ok) throw new Error("Falha no servidor");
                registos = await res.json();
                renderizarTabela();
            } catch (e) { showToast("Novo Erro de Ligação: Verifique o URL do Script"); }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela_registos');
            tbody.innerHTML = '';
            registos.sort((a,b) => new Date(a.data) - new Date(b.data));
            let sMin=0, sVal=0; const dias = new Set();
            
            registos.forEach(r => {
                if(r.data) dias.add(r.data);
                sMin += parseInt(r.minutosTotais||0);
                sVal += parseFloat(r.valorGasto||0);
                
                tbody.innerHTML += `<tr>
                    <td>${formatData(r.data)}</td><td>${r.inicio||'-'}</td><td>${r.fim||'-'}</td>
                    <td>${r.duracaoTexto||'-'}</td><td>${parseFloat(r.taxaUsada||0).toFixed(2)}€</td>
                    <td><strong>${parseFloat(r.valorGasto||0).toFixed(2)}€</strong></td>
                    <td><button class="delete-btn" onclick="apagarRegisto('${r.id}')">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('total_dias').innerText = dias.size;
            document.getElementById('total_horas').innerText = `${Math.floor(sMin/60)}h ${(sMin%60).toString().padStart(2,'0')}m`;
            document.getElementById('total_ganho').innerText = `${sVal.toFixed(2)} €`;
        }

        async function adicionarRegisto() {
            const d=document.getElementById('data').value, i=document.getElementById('hora_inicio').value, f=document.getElementById('hora_fim').value, t=parseFloat(document.getElementById('taxa_hora').value);
            if(!d || !i || !f || isNaN(t)) { showToast("Preencha tudo"); return; }
            const c = calcDiferenca(i,f);
            const req = { id: Date.now().toString(), data: d, inicio: i, fim: f, duracaoTexto: c.texto, minutosTotais: c.mins, taxaUsada: t, valorGasto: c.dec * t };
            
            showToast("A guardar...");
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(req) });
                registos.push(req);
                renderizarTabela();
                showToast("Guardado com sucesso!");
            } catch(e) { showToast("Erro ao guardar"); }
        }

        async function apagarRegisto(id) {
            if(!confirm("Apagar?")) return;
            showToast("A apagar...");
            try {
                await fetch(`${GOOGLE_SCRIPT_URL}?apagar=${id}`);
                registos = registos.filter(r => r.id !== id);
                renderizarTabela();
                showToast("Apagado!");
            } catch(e) { showToast("Erro ao apagar"); }
        }

        async function exportarPDF() {
            if(registos.length === 0) { showToast("Sem dados para exportar"); return; }
            showToast("A preparar PDF...");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Relatório de Horas", 14, 20);
            doc.autoTable({
                startY: 30,
                head: [['Data', 'Início', 'Fim', 'Duração', 'Valor']],
                body: registos.map(r => [formatData(r.data), r.inicio, r.fim, r.duracaoTexto, parseFloat(r.valorGasto).toFixed(2)+'€']),
                theme: 'striped', headStyles: { fillColor: [52, 199, 89] }
            });
            doc.text(`Total: ${document.getElementById('total_ganho').innerText}`, 14, (doc.lastAutoTable.finalY || 30) + 10);
            doc.save("Relatorio.pdf");
        }

        window.onload = () => {
            if(localStorage.getItem('tema_final') === 'dark') alternarTema();
            document.getElementById('data').valueAsDate = new Date();
            carregarDadosDoGoogle();
        };
    </script>
</body>
</html>
