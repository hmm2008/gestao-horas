<!DOCTYPE html>
<html lang="pt-PT" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Horas Cloud</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --bg-color: #f7f7f9; --card-bg: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b; --border-color: #e5e5ea; --accent-color: #007aff; --input-bg: #ffffff; }
        [data-theme="dark"] { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-muted: #98989d; --border-color: #38383a; --accent-color: #0a84ff; --input-bg: #2c2c2e; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .app-container { background: var(--card-bg); max-width: 900px; margin: auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-main); }
        .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: var(--text-muted); font-weight: bold; }
        input, select { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background-color: var(--input-bg); color: var(--text-main); }
        .btn-add { background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .summary-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: rgba(128,128,128,0.1); padding: 20px; border-radius: 12px; margin: 25px 0; border: 1px solid var(--border-color); }
        .summary-item { display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border-color); }
        .summary-item:last-child { border-right: none; }
        .val { font-size: 24px; font-weight: bold; }
        .lab { font-size: 12px; color: var(--text-muted); }
        .botoes-topo { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-acao { border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }
        .btn-pdf { background: #34c759; } .btn-graficos { background: #ff9500; } .btn-csv { background: #5856d6; }
        .filter-panel { display: flex; gap: 10px; margin-bottom: 15px; padding: 15px; background: rgba(128,128,128,0.05); border-radius: 10px; border: 1px solid var(--border-color); }
        .filter-panel select { flex: 1; font-weight: bold; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 800px; height: 85vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-color); font-weight: bold; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        .modal-footer { padding: 15px; display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid var(--border-color); }
        .btn-cancel { background: transparent; border: 1px solid var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-confirm { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="modal-pdf" class="modal-overlay">
        <div class="modal-content"><div class="modal-header">Pré-visualização</div><div class="modal-body" style="padding:0"><iframe id="pdf-preview-frame" style="width:100%; height:100%"></iframe></div><div class="modal-footer"><button class="btn-cancel" onclick="fecharModal('modal-pdf')">Cancelar</button><button class="btn-confirm" onclick="gravarPDFFinal()">Gravar</button></div></div>
    </div>
    <div id="modal-confirm" class="modal-overlay">
        <div class="modal-content" style="height:auto"><div id="modal-title" class="modal-header">Confirmar</div><div id="modal-text" class="modal-body"></div><div class="modal-footer"><button class="btn-cancel" onclick="fecharModal('modal-confirm')">Cancelar</button><button id="btn-confirm-action" class="btn-confirm">Confirmar</button></div></div>
    </div>
    <div id="modal-dashboard" class="modal-overlay">
        <div class="modal-content"><div class="modal-header">📊 Estatísticas</div><div class="modal-body"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px"><canvas id="graficoClientes"></canvas><canvas id="graficoMeses"></canvas></div></div><div class="modal-footer"><button class="btn-cancel" onclick="fecharModal('modal-dashboard')">Fechar</button></div></div>
    </div>

    <div class="app-container">
        <div class="header"><h1>Gestão de Horas</h1><button class="theme-btn" onclick="alternarTema()">☀️/🌙</button></div>
        <div class="form-grid">
            <div class="input-group"><label>Data</label><input type="date" id="data"></div>
            <div class="input-group cliente-grid"><label>Cliente</label><input type="text" id="cliente" list="lista_clientes"><datalist id="lista_clientes"></datalist></div>
            <div class="input-group"><label>Início</label><input type="time" id="hora_inicio"></div>
            <div class="input-group"><label>Fim</label><input type="time" id="hora_fim"></div>
            <div class="input-group"><label>Preço/h</label><input type="number" id="taxa_hora" step="0.5"></div>
        </div>
        <button class="btn-add" id="btn_submit" onclick="adicionarRegisto()">ADICIONAR REGISTO</button>
        <div class="summary-panel">
            <div class="summary-item"><span class="val" id="total_dias">0</span><span class="lab">Dias</span></div>
            <div class="summary-item"><span class="val" id="total_horas">0h</span><span class="lab">Horas</span></div>
            <div class="summary-item"><span class="val" id="total_ganho">0.00 €</span><span class="lab">A Receber</span>
                <div class="botoes-topo"><button class="btn-acao btn-graficos" onclick="abrirDashboard()">📊</button><button class="btn-acao btn-pdf" onclick="preVisualizarPDF()">PDF</button><button class="btn-acao btn-csv" onclick="iniciarBackupCSV()">CSV</button></div>
            </div>
        </div>
        <div class="filter-panel"><select id="filtro_mes" onchange="renderizarTabela()"><option value="todos">Todos os Meses</option></select><select id="filtro_cliente" onchange="renderizarTabela()"><option value="todos">Todos os Clientes</option></select></div>
        <div class="table-container"><table><thead><tr><th>Data</th><th>Cliente</th><th>Início</th><th>Fim</th><th>Duração</th><th>Taxa</th><th>Valor</th><th>Ações</th></tr></thead><tbody id="tabela_registos"></tbody></table></div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwExURAlBK4X0UOpvMN7DJdT_D9uo0YBmYarmoMEY9kTPqdPjtQWRZBdaq3RZyGDDUSVw/exec";
        let registos = [], idEmEdicao = null, documentoPDFFinal = null, nomePDFFinal = "", chartC = null, chartM = null;

        function fecharModal(id) { document.getElementById(id).classList.remove('show'); }
        function abrirModal(t, txt, cb) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-text').innerText = txt; document.getElementById('btn-confirm-action').onclick = () => { cb(); fecharModal('modal-confirm'); }; document.getElementById('modal-confirm').classList.add('show'); }
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.getElementById('toast-container').appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000); }

        async function carregarDadosDoGoogle() {
            if(GOOGLE_SCRIPT_URL.includes("COLE_AQUI")) return;
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?nocache=" + Date.now());
                registos = await res.json();
                atualizarDropdownsFiltros(); renderizarTabela();
            } catch(e) { showToast("Erro a carregar."); }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela_registos'); tbody.innerHTML = '';
            const data = obterRegistosFiltrados();
            let sMin=0, sVal=0, dias = new Set();
            data.forEach(r => {
                if(r.data) dias.add(r.data.split('T')[0]);
                sMin += parseInt(r.minutosTotais||0); sVal += parseFloat(r.valorGasto||0);
                tbody.innerHTML += `<tr><td>${r.data.split('T')[0].split('-').reverse().join('/')}</td><td>${r.cliente||'--'}</td><td>${r.inicio}</td><td>${r.fim}</td><td>${r.duracaoTexto}</td><td>${parseFloat(r.taxaUsada).toFixed(2)}€</td><td><strong>${parseFloat(r.valorGasto).toFixed(2)}€</strong></td><td><button class="edit-btn" onclick="editarRegisto('${r.id}')">✏️</button><button class="delete-btn" onclick="apagarRegisto('${r.id}')">🗑️</button></td></tr>`;
            });
            document.getElementById('total_dias').innerText = dias.size; document.getElementById('total_horas').innerText = `${Math.floor(sMin/60)}h`; document.getElementById('total_ganho').innerText = `${sVal.toFixed(2)} €`;
        }

        function obterRegistosFiltrados() {
            const fM = document.getElementById('filtro_mes').value, fC = document.getElementById('filtro_cliente').value;
            return [...registos].sort((a,b) => new Date(a.data) - new Date(b.data)).filter(r => (fM === 'todos' || r.data.substring(0,7) === fM) && (fC === 'todos' || r.cliente === fC));
        }

        async function adicionarRegisto() {
            const req = { id: idEmEdicao || 'REG_'+Date.now(), data: document.getElementById('data').value, inicio: document.getElementById('hora_inicio').value, fim: document.getElementById('hora_fim').value, taxaUsada: document.getElementById('taxa_hora').value, cliente: document.getElementById('cliente').value };
            const dur = calcDiferenca(req.inicio, req.fim);
            req.duracaoTexto = dur.texto; req.minutosTotais = dur.mins; req.valorGasto = dur.dec * req.taxaUsada;
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(req) });
            window.location.reload();
        }

        function calcDiferenca(ini, fim) {
            const [hI, mI] = ini.split(':').map(Number), [hF, mF] = fim.split(':').map(Number);
            let tot = (hF*60+mF) - (hI*60+mI); if(tot<0) tot += 1440;
            return { texto: `${Math.floor(tot/60)}h ${tot%60}m`, mins: tot, dec: tot/60 };
        }

       function iniciarBackupCSV() {
            const dados = obterRegistosFiltrados();
            if (dados.length === 0) { 
                showToast("Sem dados para exportar."); 
                return; 
            }

            // Função que gera o conteúdo do CSV
            const gerarConteudoCSV = () => {
                let csv = "\uFEFFData;Cliente;Inicio;Fim;Duracao;Taxa;Valor\n";
                dados.forEach(r => {
                    csv += `${r.data.split('T')[0]};${r.cliente || ''};${formatHora(r.inicio)};${formatHora(r.fim)};${r.duracaoTexto};${parseFloat(r.taxaUsada || 0).toFixed(2)};${parseFloat(r.valorGasto || 0).toFixed(2)}\n`;
                });
                return csv;
            };

            try {
                // Abrimos a caixa de diálogo e passamos a lógica de download para dentro do callback
                abrirModal("Confirmar Backup", "Deseja descarregar o ficheiro CSV com os dados atuais?", () => {
                    try {
                        const csv = gerarConteudoCSV();
                        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                        const url = URL.createObjectURL(blob);
                        
                        // Criamos o link de forma explícita
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = "Backup_Horas_" + new Date().toISOString().split('T')[0] + ".csv";
                        
                        // Adicionamos ao documento, clicamos e removemos
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        
                        showToast("Ficheiro descarregado com sucesso!");
                    } catch (e) {
                        console.error("Erro interno no download:", e);
                        showToast("Erro ao processar o download.");
                    }
                });
            } catch (e) {
                console.error("Erro ao abrir modal:", e);
                showToast("Erro ao abrir a janela de confirmação.");
            }
        }

        function abrirDashboard() {
            document.getElementById('modal-dashboard').classList.add('show');
            if(chartC) chartC.destroy(); if(chartM) chartM.destroy();
            let rend = {}, horas = {};
            registos.forEach(r => { rend[r.cliente||'S/Nome'] = (rend[r.cliente||'S/Nome']||0) + parseFloat(r.valorGasto); horas[r.data.substring(0,7)] = (horas[r.data.substring(0,7)]||0) + r.minutosTotais/60; });
            chartC = new Chart(document.getElementById('graficoClientes'), { type: 'pie', data: { labels: Object.keys(rend), datasets: [{ data: Object.values(rend), backgroundColor: ['#007aff','#34c759','#ff9500'] }] } });
            chartM = new Chart(document.getElementById('graficoMeses'), { type: 'bar', data: { labels: Object.keys(horas), datasets: [{ data: Object.values(horas), backgroundColor: '#5856d6' }] } });
        }
        
        function preVisualizarPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.autoTable({ head: [['Data', 'Cliente', 'Valor']], body: obterRegistosFiltrados().map(r => [r.data, r.cliente, r.valorGasto]) });
            document.getElementById('pdf-preview-frame').src = URL.createObjectURL(doc.output('blob'));
            documentoPDFFinal = doc; document.getElementById('modal-pdf').classList.add('show');
        }
        
        function gravarPDFFinal() { documentoPDFFinal.save("relatorio.pdf"); fecharModal('modal-pdf'); }
        function editarRegisto(id) { const r = registos.find(x => x.id === id); document.getElementById('data').value = r.data.split('T')[0]; document.getElementById('cliente').value = r.cliente; idEmEdicao = id; window.scrollTo(0,0); }
        function atualizarDropdownsFiltros() { /* preenchimento lógico para filtros */ }
        window.onload = carregarDadosDoGoogle;
    </script>
</body>
</html>
