<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Horas Cloud</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg-color: #f7f7f9; --card-bg: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b; --border-color: #e5e5ea; --accent-color: #007aff; }
        [data-theme="dark"] { --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-muted: #98989d; --border-color: #38383a; --accent-color: #0a84ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; transition: 0.3s; }
        .app-container { background: var(--card-bg); max-width: 800px; margin: auto; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-color); color: var(--text-main); }
        button.btn-add { background: var(--accent-color); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-bottom: 20px; }
        .summary-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #fbfbfd; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); }
        .summary-value { font-size: 20px; font-weight: 700; display: block; }
        .pdf-btn { background: #34c759; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; margin-top: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-container">
            <h1>Gestão de Horas</h1>
            <button onclick="alternarTema()">☀️/🌙</button>
        </div>
        <div class="form-grid">
            <input type="date" id="data">
            <input type="time" id="hora_inicio">
            <input type="time" id="hora_fim">
            <input type="number" id="taxa_hora" step="0.5">
        </div>
        <button class="btn-add" id="btn_submit" onclick="adicionarRegisto()">Adicionar Registo</button>
        
        https://script.google.com/macros/s/AKfycbyLjZgIQCIkd3BBrHGOEO0XzgpcXDFKCTK9XBPDMm9n28r-Bx-3Z1jIOaQJ8I0alMHoFA/exec
        
        <table><thead><tr><th>Data</th><th>Início</th><th>Fim</th><th>Valor</th><th>Ação</th></tr></thead><tbody id="tabela_registos"></tbody></table>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLjZgIQCIkd3BBrHGOEO0XzgpcXDFKCTK9XBPDMm9n28r-Bx-3Z1jIOaQJ8I0alMHoFA/exec";
        let registos = [];

        function alternarTema() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
        }

        async function carregarDadosDoGoogle() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                registos = await res.json();
                renderizarTabela();
            } catch (e) { console.log("Erro ao carregar"); }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela_registos');
            tbody.innerHTML = '';
            registos.sort((a, b) => new Date(a.data) - new Date(b.data));
            
            let totalMin = 0, totalVal = 0;
            registos.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.data}</td><td>${r.inicio}</td><td>${r.fim}</td><td>${parseFloat(r.valorGasto).toFixed(2)}€</td><td><button onclick="apagarRegisto('${r.id}')">🗑️</button></td></tr>`;
                totalMin += parseInt(r.minutosTotais || 0);
                totalVal += parseFloat(r.valorGasto || 0);
            });
            document.getElementById('total_dias').innerText = new Set(registos.map(r => r.data)).size;
            document.getElementById('total_horas').innerText = Math.floor(totalMin/60) + 'h';
            document.getElementById('total_ganho').innerText = totalVal.toFixed(2) + '€';
        }

        async function adicionarRegisto() {
            const r = {
                id: Date.now().toString(),
                data: document.getElementById('data').value,
                inicio: document.getElementById('hora_inicio').value,
                fim: document.getElementById('hora_fim').value,
                taxaUsada: document.getElementById('taxa_hora').value,
                minutosTotais: 60,
                valorGasto: 15
            };
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(r) });
            registos.push(r);
            renderizarTabela();
        }

        async function apagarRegisto(id) {
            await fetch(`${GOOGLE_SCRIPT_URL}?apagar=${id}`);
            registos = registos.filter(r => r.id !== id);
            renderizarTabela();
        }

        async function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Relatório de Horas", 14, 15);
            doc.autoTable({ 
                head: [['Data', 'Início', 'Fim', 'Valor']], 
                body: registos.map(r => [r.data, r.inicio, r.fim, r.valorGasto + '€']) 
            });
            doc.save("Relatorio.pdf");
        }

        window.onload = () => {
            carregarDadosDoGoogle();
            document.getElementById('data').valueAsDate = new Date();
        };
    </script>
</body>
</html>
