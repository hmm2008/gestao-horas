<!DOCTYPE html>
<html lang="pt-PT" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f7f7f9; --card: #ffffff; --text: #1d1d1f; --accent: #007aff; --border: #e5e5ea; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .app-container { background: var(--card); max-width: 900px; margin: auto; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .finance-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; background: #f0f0f0; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .fin-item { text-align: center; font-size: 11px; }
        .fin-val { display: block; font-size: 16px; font-weight: bold; color: var(--accent); }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 6px; font-weight: bold; color: white; background: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Gestão de Horas & Finanças</h1>
        
        <div class="form-grid">
            <input type="date" id="data">
            <input type="text" id="cliente" placeholder="Cliente">
            <input type="time" id="hora_inicio">
            <input type="time" id="hora_fim">
            <input type="number" id="taxa_hora" placeholder="€/h">
        </div>
        <button style="width:100%; padding:15px;" onclick="adicionarRegisto()">ADICIONAR REGISTO</button>

        <!-- Painel Financeiro Integrado -->
        <div class="finance-grid">
            <div class="fin-item">Bruto<span class="fin-val" id="f_bruto">0€</span></div>
            <div class="fin-item">Despesas<input type="number" id="inp_despesas" value="0" oninput="calcularFinancas()"></div>
            <div class="fin-item">IRS %<input type="number" id="inp_irs" value="0" oninput="calcularFinancas()"></div>
            <div class="fin-item">SS %<input type="number" id="inp_ss" value="0" oninput="calcularFinancas()"></div>
            <div class="fin-item">Impostos<span class="fin-val" id="f_impostos">0€</span></div>
            <div class="fin-item">Líquido<span class="fin-val" id="f_liquido">0€</span></div>
        </div>

        <table><thead><tr><th>Data</th><th>Cliente</th><th>Duração</th><th>Valor</th><th>Ação</th></tr></thead><tbody id="tabela_registos"></tbody></table>
    </div>

    <script>
        // ⚠️ COLOQUE AQUI O SEU LINK DO APPS SCRIPT
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwExURAlBK4X0UOpvMN7DJdT_D9uo0YBmYarmoMEY9kTPqdPjtQWRZBdaq3RZyGDDUSVw/exec";
        let registos = [];

        async function carregarDados() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL + "?nocache=" + Date.now());
                registos = await res.json();
                renderizarTabela();
            } catch(e) { console.error("Erro ao carregar:", e); }
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabela_registos');
            tbody.innerHTML = '';
            let sV = 0;
            registos.forEach(r => {
                sV += parseFloat(r.valorGasto || 0);
                tbody.innerHTML += `<tr>
                    <td>${(r.data||'').split('T')[0]}</td>
                    <td>${r.cliente||''}</td>
                    <td>${r.duracaoTexto||''}</td>
                    <td>${parseFloat(r.valorGasto||0).toFixed(2)}€</td>
                    <td><button style="background:#ff3b30" onclick="apagar('${r.id}')">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('f_bruto').innerText = sV.toFixed(2) + '€';
            calcularFinancas();
        }

        function calcularFinancas() {
            const bruto = parseFloat(document.getElementById('f_bruto').innerText.replace('€', '')) || 0;
            const despesas = parseFloat(document.getElementById('inp_despesas').value) || 0;
            const irs = (parseFloat(document.getElementById('inp_irs').value) || 0) / 100;
            const ss = (parseFloat(document.getElementById('inp_ss').value) || 0) / 100;
            
            const totalImpostos = bruto * (irs + ss);
            const liquido = bruto - despesas - totalImpostos;
            
            document.getElementById('f_impostos').innerText = totalImpostos.toFixed(2) + '€';
            document.getElementById('f_liquido').innerText = liquido.toFixed(2) + '€';
        }

        async function adicionarRegisto() {
            const d = document.getElementById('data').value;
            const cli = document.getElementById('cliente').value;
            const ini = document.getElementById('hora_inicio').value;
            const fim = document.getElementById('hora_fim').value;
            const taxa = document.getElementById('taxa_hora').value;
            
            if(!d || !ini || !fim) return alert("Preencha as horas!");

            const [hI, mI] = ini.split(':'), [hF, mF] = fim.split(':');
            let m = (hF*60 + +mF) - (hI*60 + +mI);
            if(m < 0) m += 1440;
            
            const req = { 
                id: 'R'+Date.now(), data: d, cliente: cli, inicio: ini, fim: fim, 
                taxaUsada: taxa, minutosTotais: m, 
                duracaoTexto: Math.floor(m/60)+'h '+m%60+'m', 
                valorGasto: (m/60) * taxa 
            };
            
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(req) });
            window.location.reload();
        }

        async function apagar(id) {
            await fetch(GOOGLE_SCRIPT_URL + "?apagar=" + id);
            window.location.reload();
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
